<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>📸 Scanner</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{
            height:100%;height:100dvh;overflow:hidden;background:#000;
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
            color:#e2e8f0;touch-action:none;user-select:none;
            overflow-x:hidden;width:100%;max-width:100vw;
            -webkit-font-smoothing:antialiased
        }
        .scanner-page{display:flex;flex-direction:column;height:100%;height:100dvh;position:relative}

        /* HEADER */
        .s-header{
            position:absolute;top:0;left:0;right:0;z-index:50;
            padding:max(env(safe-area-inset-top,8px),8px) 12px 8px;
            display:flex;align-items:center;justify-content:space-between;
            background:linear-gradient(180deg,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.4) 70%,transparent 100%)
        }
        .s-header .s-title{font-weight:600;font-size:.85em;display:flex;align-items:center;gap:6px}
        .s-dot{width:7px;height:7px;border-radius:50%;background:#ef4444;animation:blink 1s infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
        .s-close{
            width:40px;height:40px;border-radius:50%;
            background:rgba(239,68,68,0.3);border:2px solid rgba(239,68,68,0.6);
            color:#fff;font-size:1.2em;cursor:pointer;
            display:flex;align-items:center;justify-content:center;
            -webkit-tap-highlight-color:transparent
        }
        .s-close:active{background:rgba(239,68,68,0.6);transform:scale(0.95)}

        /* CAMERA */
        .s-camera{flex:1;position:relative;overflow:hidden;background:#000}
        #reader{width:100%;height:100%}
        #reader video{width:100%!important;height:100%!important;object-fit:cover!important}
        .s-mira{position:absolute;top:0;left:0;right:0;bottom:0;z-index:30;pointer-events:none;display:flex;align-items:center;justify-content:center}
        .s-mira-line{width:75%;max-width:300px;height:3px;background:linear-gradient(90deg,transparent 0%,#ef4444 15%,#ef4444 85%,transparent 100%);box-shadow:0 0 10px #ef4444,0 0 20px rgba(239,68,68,0.3);border-radius:2px}
        .s-flash{position:absolute;top:0;left:0;right:0;bottom:0;z-index:35;pointer-events:none;opacity:0;transition:opacity .15s}
        .s-flash.green{background:rgba(16,185,129,0.3);opacity:1}
        .s-flash.red{background:rgba(239,68,68,0.3);opacity:1}
        .s-error{position:absolute;top:0;left:0;right:0;bottom:0;z-index:40;pointer-events:none;display:none;align-items:center;justify-content:center}
        .s-error.show{display:flex}
        .s-error-box{background:rgba(239,68,68,0.95);color:#fff;padding:16px 30px;border-radius:14px;font-size:1.2em;font-weight:800;letter-spacing:1px;box-shadow:0 0 30px rgba(239,68,68,0.5);animation:popIn .2s ease}
        @keyframes popIn{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}

        /* FOOTER */
        .s-footer{
            position:absolute;bottom:0;left:0;right:0;z-index:50;
            background:rgba(0,0,0,0.92);backdrop-filter:blur(10px);
            display:flex;flex-direction:column;
            max-height:240px;
            padding-bottom:max(env(safe-area-inset-bottom,6px),6px)
        }
        .s-result{padding:7px 12px;text-align:center;font-weight:600;font-size:.82em;display:none;flex-shrink:0}
        .s-result.show{display:block;animation:popIn .3s ease}
        .s-result.green{background:rgba(16,185,129,0.15);color:#10b981}
        .s-result.red{background:rgba(239,68,68,0.15);color:#ef4444}
        .s-stats{
            display:flex;align-items:center;justify-content:center;gap:16px;
            padding:5px 12px;font-size:.78em;color:#94a3b8;flex-shrink:0;
            border-bottom:1px solid rgba(255,255,255,0.08)
        }
        .s-stats .sv{color:#10b981;font-weight:700;font-size:1.1em}
        .s-stats .se{color:#ef4444;font-weight:700;font-size:1.1em}

        /* HISTORY */
        .s-history{flex:1;overflow-y:auto;padding:3px 8px 8px;-webkit-overflow-scrolling:touch}
        .s-history::-webkit-scrollbar{width:2px}
        .s-history::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
        .s-h-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:7px;margin-bottom:2px;font-size:.78em}
        .s-h-item.found{background:rgba(16,185,129,0.08);border-left:3px solid #10b981}
        .s-h-item.not-found{background:rgba(239,68,68,0.08);border-left:3px solid #ef4444}
        .s-h-item .sh-icon{flex-shrink:0;font-size:.9em}
        .s-h-item .sh-code{font-family:'SF Mono',Consolas,monospace;font-weight:600;flex:1;color:#e2e8f0;font-size:.85em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .s-h-item .sh-loc{color:#f59e0b;font-size:.72em;flex-shrink:0;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .s-h-item .sh-time{color:rgba(255,255,255,0.25);font-size:.68em;flex-shrink:0}
        .s-h-empty{text-align:center;padding:16px;color:rgba(255,255,255,0.2);font-size:.78em}

        /* LOC MODAL */
        .loc-modal{
            position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;
            background:rgba(0,0,0,0.92);display:none;align-items:center;
            justify-content:center;padding:16px;backdrop-filter:blur(8px)
        }
        .loc-modal.show{display:flex}
        .loc-box{background:#1a2332;border:2px solid #ef4444;border-radius:18px;padding:22px;width:100%;max-width:380px;animation:popIn .3s ease}
        .loc-header{color:#ef4444;font-size:1em;font-weight:800;text-align:center;margin-bottom:10px;letter-spacing:1px}
        .loc-code{text-align:center;font-family:'SF Mono',Consolas,monospace;font-size:1.15em;font-weight:700;color:#e2e8f0;padding:10px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;margin-bottom:14px}
        .loc-label{color:#94a3b8;font-size:.85em;margin-bottom:6px}
        .loc-input{width:100%;padding:12px 14px;background:#0d1320;border:2px solid #2a3a4e;border-radius:10px;color:#e2e8f0;font-size:1em;transition:border-color .3s}
        .loc-input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.15)}
        .loc-input::placeholder{color:#64748b}
        .loc-error{color:#ef4444;font-size:.82em;font-weight:600;margin-top:6px;display:none}
        .loc-buttons{display:flex;gap:8px;margin-top:14px}
        .loc-btn{
            flex:1;padding:12px;border:none;border-radius:10px;font-size:.9em;
            font-weight:700;cursor:pointer;display:flex;align-items:center;
            justify-content:center;gap:5px;-webkit-tap-highlight-color:transparent
        }
        .loc-btn:active{transform:scale(.97)}
        .loc-btn-confirm{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;box-shadow:0 3px 10px rgba(59,130,246,0.3)}
        .loc-btn-cancel{background:rgba(100,116,139,0.2);border:1px solid rgba(100,116,139,0.3);color:#94a3b8}
    </style>
</head>
<body>
    <div class="scanner-page">
        <div class="s-header">
            <div class="s-title"><span class="s-dot"></span> Scanner de Bobinas</div>
            <button class="s-close" onclick="fechar()">✕</button>
        </div>
        <div class="s-camera">
            <div id="reader"></div>
            <div class="s-mira"><div class="s-mira-line"></div></div>
            <div class="s-flash" id="flash"></div>
            <div class="s-error" id="errorOverlay"><div class="s-error-box">❌ ERRO DE LEITURA</div></div>
        </div>
        <div class="loc-modal" id="locModal">
            <div class="loc-box">
                <div class="loc-header">⚠️ BOBINA NÃO PREVISTA</div>
                <div class="loc-code" id="locCode"></div>
                <div class="loc-label">Informe a localização:</div>
                <input type="text" class="loc-input" id="locInput"
                       placeholder="Ex: A2, E17, 240..."
                       onkeydown="if(event.key==='Enter')confirmLocation()"
                       autocomplete="off">
                <div class="loc-error" id="locError">⚠️ Localização obrigatória!</div>
                <div class="loc-buttons">
                    <button class="loc-btn loc-btn-confirm" onclick="confirmLocation()">✅ Confirmar</button>
                    <button class="loc-btn loc-btn-cancel" onclick="cancelLocation()">❌ Cancelar</button>
                </div>
            </div>
        </div>
        <div class="s-footer">
            <div class="s-result" id="result"></div>
            <div class="s-stats">
                ✅ <span class="sv" id="cntFound">0</span> conferidos
                &nbsp;│&nbsp;
                ⚠️ <span class="se" id="cntExtra">0</span> não previstas
            </div>
            <div class="s-history" id="history">
                <div class="s-h-empty" id="hEmpty">Aponte para um código de barras...</div>
            </div>
        </div>
    </div>
    <script>
    let db=[],checked=new Set(),extras=[],scanned=[],scanner=null,cooldown=false,pendingExtra=null;

    function loadData(){
        try{const s=JSON.parse(localStorage.getItem('bob3'));
        if(s){db=s.db||[];checked=new Set(s.checked||[]);extras=s.extras||[];scanned=s.scanned||[];}}catch(e){}
        updateCounters();updateHistory();
    }

    function saveData(){
        try{const current=JSON.parse(localStorage.getItem('bob3'))||{};
        current.checked=Array.from(checked);current.extras=extras;current.scanned=scanned;
        localStorage.setItem('bob3',JSON.stringify(current));}catch(e){}
    }

    function vibrate(type){if(!navigator.vibrate)return;if(type==='found')navigator.vibrate(100);else navigator.vibrate([200,100,200,100,200]);}

    let actx;
    function beep(type){
        try{if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
        const o=actx.createOscillator(),g=actx.createGain();
        o.connect(g);g.connect(actx.destination);const t=actx.currentTime;
        if(type==='found'){
            o.frequency.setValueAtTime(880,t);o.frequency.setValueAtTime(1100,t+0.1);
            g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.25);
            o.start(t);o.stop(t+0.25);
        }else{
            o.frequency.setValueAtTime(300,t);o.frequency.setValueAtTime(200,t+0.2);
            g.gain.setValueAtTime(0.4,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.6);
            o.start(t);o.stop(t+0.6);
        }}catch(e){}
    }

    function processScan(code){
        const time=new Date().toLocaleTimeString('pt-BR');
        const flash=document.getElementById('flash');
        const result=document.getElementById('result');
        const error=document.getElementById('errorOverlay');

        if(!/^(500|700)\d{8}$/.test(code)){
            flash.className='s-flash red';setTimeout(()=>flash.className='s-flash',300);
            error.classList.add('show');setTimeout(()=>error.classList.remove('show'),2000);
            vibrate('notfound');beep('notfound');return;
        }
        if(checked.has(code)){
            flash.className='s-flash green';setTimeout(()=>flash.className='s-flash',300);
            result.className='s-result show green';result.textContent=`✅ "${code}" — já conferido`;
            vibrate('found');beep('found');setTimeout(()=>result.classList.remove('show'),2000);return;
        }
        if(extras.includes(code)){
            flash.className='s-flash red';setTimeout(()=>flash.className='s-flash',300);
            result.className='s-result show red';result.textContent=`⚠️ "${code}" — já registrado`;
            vibrate('notfound');beep('notfound');setTimeout(()=>result.classList.remove('show'),2000);return;
        }
        if(db.includes(code)){
            checked.add(code);scanned.unshift({code,time,status:'found'});
            flash.className='s-flash green';result.className='s-result show green';
            result.textContent=`✅ CONFERIDO — "${code}"`;
            vibrate('found');beep('found');
            setTimeout(()=>flash.className='s-flash',300);
            setTimeout(()=>result.classList.remove('show'),3000);
            saveData();updateCounters();updateHistory();
        }else{
            flash.className='s-flash red';setTimeout(()=>flash.className='s-flash',300);
            vibrate('notfound');beep('notfound');
            pendingExtra={code,time};cooldown=true;showLocationModal(code);
        }
    }

    function showLocationModal(code){
        document.getElementById('locModal').classList.add('show');
        document.getElementById('locCode').textContent=code;
        document.getElementById('locInput').value='';
        document.getElementById('locError').style.display='none';
        setTimeout(()=>document.getElementById('locInput').focus(),300);
    }

    function confirmLocation(){
        const input=document.getElementById('locInput');const loc=input.value.trim();
        if(!loc){document.getElementById('locError').style.display='block';input.focus();vibrate('notfound');return;}
        if(pendingExtra){
            extras.push(pendingExtra.code);
            scanned.unshift({code:pendingExtra.code,time:pendingExtra.time,status:'not-found',location:loc});
            const result=document.getElementById('result');
            result.className='s-result show red';result.textContent=`⚠️ "${pendingExtra.code}" — 📍 ${loc}`;
            setTimeout(()=>result.classList.remove('show'),3000);
            saveData();updateCounters();updateHistory();pendingExtra=null;
        }
        document.getElementById('locModal').classList.remove('show');
        setTimeout(()=>{cooldown=false;},1000);
    }

    function cancelLocation(){
        pendingExtra=null;document.getElementById('locModal').classList.remove('show');
        setTimeout(()=>{cooldown=false;},500);
    }

    function updateCounters(){
        document.getElementById('cntFound').textContent=checked.size;
        document.getElementById('cntExtra').textContent=extras.length;
    }

    function updateHistory(){
        const box=document.getElementById('history');const empty=document.getElementById('hEmpty');
        const items=scanned.slice(0,30);
        if(items.length===0){empty.style.display='block';box.querySelectorAll('.s-h-item').forEach(el=>el.remove());return;}
        empty.style.display='none';let html='';
        items.forEach(s=>{
            if(s.status==='found'){
                html+=`<div class="s-h-item found"><span class="sh-icon">✅</span><span class="sh-code">${s.code}</span><span class="sh-time">${s.time}</span></div>`;
            }else{
                const loc=s.location?`<span class="sh-loc">📍${s.location}</span>`:'';
                html+=`<div class="s-h-item not-found"><span class="sh-icon">⚠️</span><span class="sh-code">${s.code}</span>${loc}<span class="sh-time">${s.time}</span></div>`;
            }
        });
        box.querySelectorAll('.s-h-item').forEach(el=>el.remove());
        box.insertAdjacentHTML('afterbegin',html);
    }

    function fechar(){
        if(scanner){scanner.stop().then(()=>scanner.clear()).catch(()=>{});}
        window.close();setTimeout(()=>{window.location.href='index.html';},500);
    }

    async function iniciar(){
        loadData();
        if(db.length===0){alert('Nenhum dado importado! Volte ao sistema principal e importe os códigos.');fechar();return;}
        try{
            const devices=await Html5Qrcode.getCameras();
            if(!devices||devices.length===0){alert('Nenhuma câmera encontrada!');fechar();return;}
            let camId=devices[devices.length-1].id;
            const back=devices.find(d=>d.label.toLowerCase().includes('back')||d.label.toLowerCase().includes('traseira')||d.label.toLowerCase().includes('rear')||d.label.toLowerCase().includes('environment'));
            if(back)camId=back.id;
            scanner=new Html5Qrcode("reader",{verbose:false});
            await scanner.start(camId,
                {fps:15,qrbox:{width:280,height:100},disableFlip:true,
                formatsToSupport:[
                    Html5QrcodeSupportedFormats.EAN_13,Html5QrcodeSupportedFormats.EAN_8,
                    Html5QrcodeSupportedFormats.CODE_128,Html5QrcodeSupportedFormats.CODE_39,
                    Html5QrcodeSupportedFormats.CODE_93,Html5QrcodeSupportedFormats.UPC_A,
                    Html5QrcodeSupportedFormats.UPC_E,Html5QrcodeSupportedFormats.ITF,
                    Html5QrcodeSupportedFormats.CODABAR,Html5QrcodeSupportedFormats.QR_CODE,
                    Html5QrcodeSupportedFormats.DATA_MATRIX
                ]},
                (text)=>{if(cooldown)return;cooldown=true;processScan(text.trim());if(!pendingExtra){setTimeout(()=>{cooldown=false;},2000);}},
                ()=>{}
            );
            setTimeout(()=>{
                document.querySelectorAll('#reader > div > div').forEach(el=>el.style.display='none');
                document.querySelectorAll('#reader img, #reader canvas, #reader br, #reader span').forEach(el=>el.style.display='none');
            },800);
        }catch(err){
            console.error(err);
            let msg='Erro ao acessar câmera. ';
            if(err.toString().includes('NotAllowedError'))msg+='Permissão negada.';
            else msg+=err.toString();
            alert(msg);fechar();
        }
    }
    iniciar();
    </script>
</body>
</html>
